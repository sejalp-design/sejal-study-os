<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>9th Grade Study OS | Topper Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { 
            background: radial-gradient(circle at top right, #1e293b, #0f172a); 
            color: white; 
            font-family: 'Inter', sans-serif; 
            min-height: 100vh;
        }
        .glass { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 24px; 
            transition: transform 0.3s ease;
        }
        .glass:hover { transform: translateY(-5px); border-color: rgba(255, 255, 255, 0.2); }
        .accent-glow { box-shadow: 0 0 20px rgba(96, 165, 250, 0.2); }
        .progress-ring { transition: stroke-dashoffset 0.35s; transform: rotate(-90deg); transform-origin: 50% 50%; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <header class="mb-10 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold tracking-tight">Study OS <span class="text-blue-400">2.0</span></h1>
                <p class="text-slate-400 mt-2">Welcome back, Topper Sejal. Ready for 9th Grade Excellence?</p>
            </div>
            <div class="text-right hidden md:block">
                <p class="text-sm text-slate-500">Target: 95%+</p>
                <div class="h-1 w-32 bg-slate-800 rounded-full mt-1"><div class="h-1 w-24 bg-blue-500 rounded-full"></div></div>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="glass p-6 flex flex-col items-center justify-between accent-glow">
                <h3 class="text-lg font-semibold mb-4 flex items-center gap-2">💧 Hydration Hero</h3>
                <div class="relative w-32 h-32">
                    <svg class="w-full h-full">
                        <circle class="text-slate-800" stroke-width="8" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                        <circle id="water-progress" class="text-blue-500 progress-ring" stroke-width="8" stroke-dasharray="364.4" stroke-dashoffset="364.4" stroke-linecap="round" stroke="currentColor" fill="transparent" r="58" cx="64" cy="64"/>
                    </svg>
                    <div class="absolute inset-0 flex items-center justify-center">
                        <span id="water-percent" class="text-2xl font-bold">0%</span>
                    </div>
                </div>
                <p class="text-xs text-slate-400 mt-4 text-center">Goal: 3 Liters / Day</p>
                <button onclick="addWater()" class="mt-4 w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-semibold transition-all active:scale-95">Drink 250ml</button>
            </div>

            <div class="glass p-6 flex flex-col items-center justify-center text-center border-emerald-500/30">
                <h3 class="text-lg font-semibold mb-2">🌳 Math Focus Tree</h3>
                <div id="tree-stage" class="text-6xl my-4">🌱</div>
                <p class="text-sm text-slate-400">Status: Sprout</p>
                <div class="mt-4 text-xs bg-emerald-500/10 text-emerald-400 px-3 py-1 rounded-full border
